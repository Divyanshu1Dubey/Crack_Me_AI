services:
  - type: web
    name: crackcms-backend
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn crack_cms.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 180 --log-level info --access-logfile - --error-logfile -"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY2
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DISABLE_RAG
        value: "true"
