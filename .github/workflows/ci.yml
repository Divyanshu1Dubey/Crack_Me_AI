name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Django checks
        run: python manage.py check --deploy 2>&1 || true
      - name: Run migrations check
        run: python manage.py makemigrations --check --dry-run
      - name: Run tests
        run: python manage.py test --verbosity=2
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'False'

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Security audit
        run: npm audit --audit-level=high || true
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install security tools
        run: pip install bandit safety
      - name: Bandit SAST scan
        run: bandit -r backend/ -x backend/__pycache__,backend/migrations --skip B101 -f json -o bandit-report.json || true
      - name: Safety dependency check
        run: safety check -r backend/requirements.txt || true
